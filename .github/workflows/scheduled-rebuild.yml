name: Scheduled Rebuild

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:          # Manual trigger option

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
